<!DOCTYPE html>
<html lang="en">
<head>
  <title>PADHOKHUDSE</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <style>
    body { font-family: system-ui; }

    .chat-user {
      background: linear-gradient(135deg,#3b82f6,#9333ea);
      color:white;
    }

    .chat-ai {
      background: #1e293b;
      color: #e2e8f0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .fade {
      animation: fade 0.3s ease;
    }

    @keyframes fade {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1; transform:translateY(0);}
    }

    .cursor::after {
      content:"|";
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% {opacity:0;}
    }
  </style>
</head>

<body class="bg-[#020617] text-gray-200">

<button onclick="toggleTheme()" class="fixed top-4 right-4">🌙</button>

<!-- FRONT -->
<div id="landing" class="h-screen flex flex-col justify-center items-center text-center">
  <h1 class="text-5xl text-blue-500 mb-4">PADHOKHUDSE 🇮🇳❤️</h1>
  <button onclick="startApp()" class="bg-blue-500 px-6 py-3 rounded">
    🚀 Start Learning
  </button>
</div>

<!-- LOADER -->
<div id="loaderPage" style="display:none;" class="h-screen flex flex-col justify-center items-center text-center">
  <h1 class="text-2xl mb-4">📚 PADHOKHUDSE</h1>
  <p class="animate-pulse">Get ready 🚀</p>
</div>

<!-- APP -->
<div id="app" style="display:none;" class="flex h-screen">

<!-- SIDEBAR -->
<div class="w-64 bg-[#020617] p-3">
  <button onclick="generateQuiz()" class="bg-green-500 w-full p-2 mb-2 rounded">📝 Quiz</button>
  <button onclick="showDashboard()" class="bg-purple-500 w-full p-2 mb-2 rounded">📊 Dashboard</button>

  <select id="mode" class="w-full p-2 rounded text-black">
    <option value="short">Short</option>
    <option value="long">Detailed</option>
  </select>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

  <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

  <div class="p-4 flex gap-2 border-t border-gray-700">
    <input id="topic" class="flex-1 p-3 rounded text-black" placeholder="Ask anything...">
    <button onclick="learnTopic()" class="bg-blue-500 px-4 rounded">Send</button>
  </div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
