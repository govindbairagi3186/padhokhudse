<!DOCTYPE html>
<html lang="en">
<head>
  <title>PADHOKHUDSE</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <style>
    body { font-family: system-ui; }

    .chat-user {
      background: linear-gradient(135deg,#3b82f6,#9333ea);
      color:white;
    }

    .chat-ai {
      background: #1e293b;
      color: #f1f5f9;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .fade { animation: fade 0.3s ease; }

    @keyframes fade {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1; transform:translateY(0);}
    }

    .cursor::after {
      content: "|";
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% {opacity:0;}
    }
  </style>
</head>

<body class="bg-[#020617] text-gray-200">

<!-- FRONT PAGE -->
<div id="landing" class="h-screen flex flex-col justify-center items-center text-center">
  <h1 class="text-5xl text-blue-500 mb-4">PADHOKHUDSE 🇮🇳❤️</h1>
  <p class="mb-6 text-gray-400">Learn smarter with AI 🚀</p>

  <button onclick="startApp()" class="bg-blue-500 px-6 py-3 rounded hover:scale-105 transition">
    🚀 Start Learning
  </button>

  <p class="absolute bottom-4 text-sm text-gray-500">
    Made with ❤️ in 🇮🇳 by GOVIND VAISHNAV 💗
  </p>
</div>

<!-- LOADING PAGE -->
<div id="loaderPage" style="display:none;" class="h-screen flex flex-col justify-center items-center text-center">

  <h1 class="text-3xl mb-4">📚 PADHOKHUDSE</h1>

  <p id="motivation" class="animate-pulse text-lg mb-3"></p>

  <p class="text-gray-500 text-sm">
    Building your future… one step at a time 🚀
  </p>

  <p class="mt-6 text-xs text-gray-500">
    By Govind Vaishnav 💗
  </p>

</div>

<!-- APP -->
<div id="app" style="display:none;" class="flex h-screen">

<!-- SIDEBAR -->
<div class="w-64 bg-[#020617] p-4 flex flex-col border-r border-gray-800">

  <button onclick="newChat()" class="bg-blue-500 p-2 rounded mb-2">
    💬 New Chat
  </button>

  <button onclick="generateQuiz()" class="bg-green-500 p-2 rounded mb-2">
    📝 Quiz
  </button>

  <button onclick="showDashboard()" class="bg-purple-500 p-2 rounded mb-3">
    📊 Dashboard
  </button>

  <select id="mode" class="p-2 rounded text-black">
    <option value="short">Short</option>
    <option value="long">Detailed</option>
  </select>

</div>

<!-- CHAT -->
<div class="flex-1 flex flex-col">

  <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

  <div class="p-4 flex gap-2 border-t border-gray-700">
    <input id="topic" class="flex-1 p-3 rounded text-black"
      placeholder="Ask anything...">

    <button onclick="learnTopic()" class="bg-blue-500 px-4 rounded">
      Send
    </button>
  </div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
