<!DOCTYPE html>
<html lang="en">
<head>
  <title>PADHOKHUDSE</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background:#0f172a; font-family:system-ui; }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .user { background:#2563eb; }
    .ai { background:#1f2937; }

    h2 { font-size:18px; font-weight:600; margin-top:10px; }
    ul { padding-left:20px; }
  </style>
</head>

<body class="text-gray-200">

<!-- 🌟 LANDING -->
<div id="landing" class="h-screen flex flex-col justify-center items-center text-center">
  <h1 class="text-4xl mb-4">PADHOKHUDSE 🇮🇳❤️</h1>
  <p class="text-gray-400 mb-6">Learn anything with AI</p>
  <button onclick="showLogin()" class="px-6 py-2 bg-blue-500 rounded">Get Started</button>
</div>

<!-- 🔐 LOGIN -->
<div id="loginPage" class="hidden h-screen flex justify-center items-center">
  <div class="glass p-6 rounded">
    <h2 class="mb-3">Login</h2>
    <input id="username" placeholder="Enter name" class="p-2 text-black rounded w-full"/>
    <button onclick="login()" class="mt-3 w-full bg-blue-500 p-2 rounded">Enter</button>
  </div>
</div>

<!-- 💬 APP -->
<div id="app" class="hidden flex h-screen">

<!-- SIDEBAR -->
<div class="w-64 glass p-3 flex flex-col">
  <button onclick="newChat()" class="mb-3 bg-blue-500 p-2 rounded">+ New Chat</button>
  <div id="history" class="flex-1 overflow-y-auto space-y-2"></div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col p-4">

  <div id="chatBox" class="flex-1 overflow-y-auto space-y-3 p-4 glass rounded"></div>

  <div class="flex mt-3 gap-2">
    <input id="topic" class="flex-1 p-3 bg-[#111827] rounded" placeholder="Ask anything..."/>
    <button onclick="learnTopic()" class="bg-blue-500 px-4 rounded">Send</button>
  </div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
