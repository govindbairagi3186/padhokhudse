<!DOCTYPE html>
<html lang="en">
<head>
  <title>PADHOKHUDSE</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ENABLE DARK MODE -->
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <style>
    body { font-family: system-ui; }

    /* cursor glow (only landing/login) */
    #cursorGlow {
      position: fixed;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(59,130,246,0.4), transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    .chat-user {
      background: linear-gradient(135deg,#3b82f6,#9333ea);
      color:white;
    }

    .chat-ai {
      background: rgba(255,255,255,0.05);
    }

    .cursor {
      display:inline-block;
      width:6px;
      background: currentColor;
      animation:blink 1s infinite;
    }

    @keyframes blink {50%{opacity:0}}

    .scroll-btn {
      position:absolute;
      bottom:80px;
      right:20px;
      background:#2563eb;
      padding:10px;
      border-radius:50%;
      cursor:pointer;
    }
  </style>
</head>

<body class="bg-white dark:bg-[#0f172a] text-black dark:text-gray-200 transition">

<!-- 🌗 THEME BUTTON -->
<button id="themeBtn"
  onclick="toggleTheme()"
  class="fixed top-4 right-4 z-50 px-3 py-1 rounded bg-gray-200 dark:bg-gray-800">
</button>

<div id="cursorGlow"></div>

<!-- 🌟 LANDING -->
<div id="landing" class="h-screen flex flex-col justify-center items-center text-center relative">
  <h1 class="text-5xl font-bold text-blue-500">PADHOKHUDSE 🇮🇳❤️</h1>
  <p class="mt-4 text-gray-500 dark:text-gray-400">Learn anything with AI 🚀</p>
  <button onclick="showLogin()" class="mt-6 bg-blue-500 px-6 py-2 rounded text-white">
    Start Learning →
  </button>
</div>

<!-- 🔐 LOGIN -->
<div id="loginPage" class="hidden h-screen flex justify-center items-center">
  <div class="p-6 rounded-xl shadow-lg bg-white dark:bg-[#1e293b] w-80 text-center">
    <h2 class="text-xl mb-2">Welcome 👋</h2>
    <input id="username" placeholder="Enter your name"
      class="w-full p-2 rounded border mt-2 text-black"/>
    <button onclick="login()" class="mt-3 w-full bg-blue-500 text-white p-2 rounded">
      Continue
    </button>
  </div>
</div>

<!-- 💬 APP -->
<div id="app" class="hidden flex h-screen">

<!-- SIDEBAR -->
<div class="w-64 bg-gray-100 dark:bg-[#020617] p-3">
  <button onclick="newChat()" class="bg-blue-500 text-white w-full p-2 rounded mb-3">
    + New Chat
  </button>
  <div id="history"></div>
</div>

<!-- CHAT -->
<div class="flex-1 flex flex-col relative">

  <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

  <!-- Scroll Button -->
  <div class="scroll-btn text-white" onclick="scrollBottom()">⬇️</div>

  <!-- INPUT -->
  <div class="p-4 border-t dark:border-gray-700 flex gap-2">
    <input id="topic"
      class="flex-1 p-3 rounded border bg-white dark:bg-[#020617] text-black dark:text-white"
      placeholder="Ask anything..." />
    <button onclick="learnTopic()" class="bg-blue-500 text-white px-4 rounded">
      Send
    </button>
  </div>

</div>
</div>

<script src="script.js"></script>

<script>
document.addEventListener("mousemove", e => {
  if(app.style.display !== "flex"){
    cursorGlow.style.left = e.clientX + "px";
    cursorGlow.style.top = e.clientY + "px";
  }
});
</script>

</body>
</html>
