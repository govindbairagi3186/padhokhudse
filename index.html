<!DOCTYPE html>
<html lang="en">
<head>
  <title>AI Tutor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-purple-500 to-pink-500 text-white">

<div class="max-w-3xl mx-auto p-5">
  <h1 class="text-3xl font-bold text-center mb-5">AI Tutor 🚀</h1>

  <input id="topic" placeholder="Enter topic..."
    class="w-full p-3 rounded text-black mb-3"/>

  <button onclick="learnTopic()"
    class="bg-yellow-400 text-black px-4 py-2 rounded">
    Learn
  </button>

  <button onclick="generateQuiz()"
    class="bg-green-400 text-black px-4 py-2 rounded ml-2">
    Quiz
  </button>

  <div id="output" class="mt-5 bg-white text-black p-4 rounded"></div>

  <h2 class="mt-6 text-xl">Ask Doubt 💬</h2>
  <input id="chatInput" class="w-full p-3 rounded text-black"/>
  <button onclick="chat()" class="bg-blue-400 px-4 py-2 rounded mt-2">
    Ask
  </button>

  <div id="chatOutput" class="mt-3 bg-white text-black p-3 rounded"></div>
</div>

<script src="script.js"></script>
</body>
</html>
