<!DOCTYPE html>
<html lang="en">
<head>
  <title>PADHOKHUDSE</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <style>
    body { font-family: system-ui; }

    .chat-user {
      background: linear-gradient(135deg,#3b82f6,#9333ea);
      color:white;
    }

    .chat-ai {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body class="bg-white dark:bg-[#0f172a] text-black dark:text-gray-200">

<!-- THEME -->
<button id="themeBtn"
onclick="toggleTheme()"
class="fixed top-4 right-4 px-3 py-1 bg-gray-200 dark:bg-gray-800 rounded z-50">
</button>

<!-- FRONT PAGE -->
<div id="landing" class="h-screen flex flex-col justify-center items-center text-center">

  <h1 class="text-5xl font-bold text-blue-500 mb-4">
    PADHOKHUDSE 🇮🇳❤️
  </h1>

  <p class="text-gray-500 mb-6">
    Learn smarter with AI, quizzes & progress 🚀
  </p>

  <button onclick="showLogin()" 
    class="bg-blue-500 text-white px-6 py-3 rounded hover:scale-105 transition">
    🚀 Start Learning
  </button>

  <p class="absolute bottom-4 text-sm text-gray-500">
    Made with ❤️ in 🇮🇳 by GOVIND VAISHNAV 💗
  </p>

</div>

<!-- LOGIN -->
<div id="loginPage" class="hidden h-screen flex justify-center items-center">
  <div class="bg-white dark:bg-[#1e293b] p-6 rounded w-80 text-center">
    <input id="username" placeholder="Enter your name"
      class="w-full p-2 text-black rounded"/>

    <button onclick="login()"
      class="mt-3 bg-blue-500 text-white w-full p-2 rounded">
      Continue
    </button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden flex h-screen">

<!-- SIDEBAR -->
<div class="w-64 bg-gray-100 dark:bg-[#020617] p-3 flex flex-col">

  <button onclick="newChat()" class="bg-blue-500 text-white p-2 rounded mb-2">
    💬 New Chat
  </button>

  <button onclick="generateQuiz()" class="bg-green-500 text-white p-2 rounded mb-2">
    📝 Quiz
  </button>

  <button onclick="showDashboard()" class="bg-purple-500 text-white p-2 rounded mb-2">
    📊 Dashboard
  </button>

  <!-- HISTORY -->
  <div class="mt-4 text-sm overflow-y-auto" id="history"></div>

</div>

<!-- MAIN CHAT -->
<div class="flex-1 flex flex-col relative">

  <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

  <!-- Latest Button -->
  <button onclick="scrollBottom()"
    class="fixed bottom-24 right-6 bg-blue-500 text-white px-3 py-2 rounded-full">
    ⬇️
  </button>

  <div class="p-4 flex gap-2 border-t dark:border-gray-700">
    <input id="topic" class="flex-1 p-3 rounded border dark:bg-[#020617]"
      placeholder="Ask anything...">

    <button onclick="learnTopic()"
      class="bg-blue-500 text-white px-4 rounded">
      Send
    </button>
  </div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
