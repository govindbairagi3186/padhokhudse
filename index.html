<!DOCTYPE html>
<html lang="en">
<head>
  <title>PADHOKHUDSE</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #0f172a;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .chat-container {
      max-height: 60vh;
      overflow-y: auto;
    }

    .user-msg {
      background: #1f2937;
    }

    .ai-msg {
      background: #111827;
    }
  </style>
</head>

<body class="text-gray-200 flex flex-col items-center min-h-screen">

<!-- HEADER -->
<h1 class="text-xl mt-6 mb-4">PADHOKHUDSE 🇮🇳❤️</h1>

<!-- CHAT BOX -->
<div class="w-full max-w-2xl flex flex-col">

  <div id="chatBox" class="chat-container space-y-4 p-4 border border-gray-700 rounded-md">

    <!-- messages appear here -->

  </div>

  <!-- INPUT -->
  <div class="flex mt-4 gap-2">
    <input id="topic"
      placeholder="Ask or enter topic..."
      class="flex-1 p-3 bg-transparent border border-gray-700 rounded-md outline-none"/>

    <button onclick="learnTopic()" 
      class="px-4 border border-gray-600 rounded-md hover:bg-gray-800">
      Send
    </button>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="flex gap-2 mt-3">
    <button onclick="generateQuiz()" 
      class="flex-1 text-sm border border-gray-600 py-2 rounded-md hover:bg-gray-800">
      Quiz
    </button>
  </div>

  <!-- LOADER -->
  <div id="loader" class="hidden text-center text-sm text-gray-400 mt-3">
    AI is thinking...
  </div>

</div>

<!-- FOOTER -->
<div class="text-center mt-10 text-xs text-gray-500">
  <p>Made with ❤️ in India 🇮🇳 Mathura 🚩</p>
  <p class="mt-1">Govind Vaishnav 💗</p>
</div>

<script src="script.js"></script>
</body>
</html>
