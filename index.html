<!DOCTYPE html>
<html lang="en">
<head>
  <title>PADHOKHUDSE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <style>
    body { font-family: system-ui; }

    .glass {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
    }

    .chat-user {
      background: linear-gradient(135deg,#3b82f6,#9333ea);
      color: white;
    }

    .chat-ai {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
    }

    .typing {
      display: inline-block;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body class="bg-white dark:bg-[#0f172a] text-black dark:text-gray-200 transition">

<!-- THEME -->
<button id="themeBtn" onclick="toggleTheme()"
class="fixed top-4 right-4 px-3 py-1 rounded bg-gray-200 dark:bg-gray-800 z-50">
🌙
</button>

<!-- FRONT -->
<div id="landing" class="h-screen flex flex-col justify-center items-center text-center relative overflow-hidden">

  <h1 class="text-5xl font-bold text-blue-500 mb-3">PADHOKHUDSE 🇮🇳</h1>
  <p class="text-gray-500 mb-6">AI Tutor + Quiz Engine</p>

  <button onclick="showLogin()" class="bg-blue-500 text-white px-6 py-3 rounded-xl hover:scale-105">
    🚀 Start Learning
  </button>
</div>

<!-- LOGIN -->
<div id="loginPage" class="hidden h-screen flex justify-center items-center">
  <div class="glass p-6 w-80 text-center">
    <input id="username" placeholder="Enter your name"
      class="w-full p-2 rounded text-black"/>
    <button onclick="login()"
      class="mt-3 bg-blue-500 text-white w-full p-2 rounded">
      Continue
    </button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden flex h-screen">

<!-- SIDEBAR -->
  <div id="history" class="mt-4 text-sm"></div>
<div class="w-64 bg-gray-100 dark:bg-[#020617] p-3 flex flex-col gap-2">
  <button onclick="newChat()" class="bg-blue-500 text-white p-2 rounded">💬 Chat</button>
  <button onclick="generateQuiz()" class="bg-green-500 text-white p-2 rounded">📝 Quiz</button>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

  <!-- CHAT -->
  <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

  <!-- INPUT -->
  <div class="p-4 flex gap-2 border-t dark:border-gray-700">
    <input id="topic" class="flex-1 p-3 rounded border dark:bg-[#020617]"
      placeholder="Ask anything...">
    <button onclick="learnTopic()" class="bg-blue-500 text-white px-4 rounded">
      Send
    </button>
  </div>

  <!-- QUIZ SECTION -->
  <div id="quizBox" class="hidden p-6 border-t dark:border-gray-700">
    <h2 class="text-xl font-bold mb-3">📝 Quiz</h2>
    <div id="quizContent"></div>
  </div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
