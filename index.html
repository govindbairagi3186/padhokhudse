<!DOCTYPE html>
<html lang="en">
<head>
  <title>AI Tutor</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Animation library -->
  <script src="https://unpkg.com/framer-motion/dist/framer-motion.umd.js"></script>

  <style>
    .glass {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
    }
  </style>
</head>

<body class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center text-white">

<div class="w-full max-w-3xl p-6 glass shadow-2xl">

  <h1 class="text-4xl font-bold text-center mb-6 animate-pulse">
    AI Tutor 🚀
  </h1>

  <!-- Input -->
  <input id="topic"
    placeholder="Enter any topic..."
    class="w-full p-3 rounded-lg text-black mb-4 focus:outline-none focus:ring-2 focus:ring-yellow-400 transition"/>

  <!-- Buttons -->
  <div class="flex gap-3 justify-center">
    <button onclick="learnTopic()" 
      class="bg-yellow-400 text-black px-5 py-2 rounded-lg hover:scale-110 transition">
      Learn
    </button>

    <button onclick="generateQuiz()" 
      class="bg-green-400 text-black px-5 py-2 rounded-lg hover:scale-110 transition">
      Quiz
    </button>
  </div>

  <!-- Loader -->
  <div id="loader" class="hidden text-center mt-4 animate-spin text-2xl">
    ⏳
  </div>

  <!-- Output -->
  <div id="output" 
    class="mt-5 p-4 bg-white text-black rounded-lg opacity-0 transition duration-500">
  </div>

  <!-- Chat -->
  <h2 class="mt-6 text-xl">Ask Doubt 💬</h2>

  <input id="chatInput"
    class="w-full p-3 rounded-lg text-black mt-2"/>

  <button onclick="chat()"
    class="bg-blue-400 px-5 py-2 rounded-lg mt-3 hover:scale-110 transition">
    Ask
  </button>

  <div id="chatOutput"
    class="mt-4 p-3 bg-white text-black rounded-lg opacity-0 transition duration-500">
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
