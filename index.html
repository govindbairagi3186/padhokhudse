<!DOCTYPE html>
<html lang="en">
<head>
  <title>PADHOKHUDSE</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: system-ui;
      background: linear-gradient(135deg,#020617,#0f172a,#1e293b);
      color:#e2e8f0;
    }

    .chat-row { display:flex; gap:10px; margin-bottom:10px; }
    .avatar {
      width:35px;height:35px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
    }
    .ai-avatar { background:#22c55e; }
    .user-avatar { background:#9333ea; }

    .bubble {
      padding:12px;border-radius:12px;max-width:600px;
    }
    .ai-bubble { background:rgba(255,255,255,0.08); }
    .user-bubble { background:#3b82f6; margin-left:auto; }

    .page { display:none; }
    .page.active { display:block; }

    .typing span {
      width:6px;height:6px;background:#ccc;border-radius:50%;
      display:inline-block;margin:2px;
      animation:bounce 1.2s infinite;
    }
    .typing span:nth-child(2){animation-delay:.2s}
    .typing span:nth-child(3){animation-delay:.4s}

    @keyframes bounce {
      0%,80%,100%{transform:scale(.6);opacity:.5}
      40%{transform:scale(1);opacity:1}
    }
  </style>
</head>

<body>

<!-- FRONT -->
<div id="landing" class="h-screen flex flex-col justify-center items-center">
  <h1 class="text-5xl mb-4">🤖 PADHOKHUDSE</h1>
  <button onclick="startApp()" class="bg-blue-500 px-6 py-3 rounded">
    Start Learning
  </button>
</div>

<!-- APP -->
<div id="app" class="hidden flex h-screen">

<!-- SIDEBAR -->
<div class="w-64 p-4 bg-black/40 flex flex-col">
  <button onclick="showPage('chat')">💬 Chat</button>
  <button onclick="showPage('quiz')">📝 Quiz</button>
  <button onclick="showPage('practice')">🎯 Practice</button>
  <button onclick="showPage('exam')">⏱️ Exam</button>
  <button onclick="showPage('dashboard')">📊 Dashboard</button>
  <button onclick="showPage('notes')">📒 Notes</button>
  <button onclick="showPage('shared')">🧑‍🤝‍🧑 Shared</button>
</div>

<!-- CONTENT -->
<div class="flex-1">

<div id="chatPage" class="page active flex flex-col h-full">
  <div id="chatBox" class="flex-1 overflow-y-auto p-6"></div>

  <div class="p-4 flex gap-2">
    <input id="topic" class="flex-1 p-2 text-black rounded">
    <button onclick="learnTopic()" class="bg-blue-500 px-4">Send</button>
  </div>
</div>

<div id="quizPage" class="page p-6">
  <input id="quizTopic" class="p-2 text-black rounded">
  <button onclick="startQuiz()" class="bg-green-500 px-3">Start</button>
  <div id="quizBox"></div>
</div>

<div id="practicePage" class="page p-6">
  <input id="practiceTopic" class="p-2 text-black rounded">
  <button onclick="startPractice()" class="bg-yellow-500 px-3">Start</button>
</div>

<div id="examPage" class="page p-6">
  <button onclick="startExam()" class="bg-red-500 px-4">Start Exam</button>
  <div id="examTimer"></div>
</div>

<div id="dashboardPage" class="page p-6">
  <canvas id="chart"></canvas>
</div>

<div id="notesPage" class="page p-6">
  <div id="notesBox"></div>
</div>

<div id="sharedPage" class="page p-6">
  <div id="sharedBox"></div>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
