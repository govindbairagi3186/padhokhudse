<!DOCTYPE html>
<html lang="en">
<head>
  <title>PADHOKHUDSE</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .glass {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
    }
  </style>
</head>

<body class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center text-white">

<div class="w-full max-w-3xl p-6 glass shadow-2xl">

  <!-- TITLE -->
  <h1 class="text-4xl font-bold text-center mb-6 animate-pulse bg-gradient-to-r from-yellow-300 to-pink-400 bg-clip-text text-transparent">
    PADHOKHUDSE 🇮🇳❤️
  </h1>

  <!-- INPUT -->
  <input id="topic"
    placeholder="Enter any topic..."
    class="w-full p-3 rounded-lg text-black mb-4 focus:outline-none focus:ring-2 focus:ring-yellow-400 transition"/>

  <!-- BUTTONS -->
  <div class="flex gap-3 justify-center">
    <button onclick="learnTopic()" 
      class="bg-yellow-400 text-black px-5 py-2 rounded-lg hover:scale-110 transition">
      Learn
    </button>

    <button onclick="generateQuiz()" 
      class="bg-green-400 text-black px-5 py-2 rounded-lg hover:scale-110 transition">
      Quiz
    </button>
  </div>

  <!-- LOADER -->
  <div id="loader" class="hidden flex justify-center mt-4">
    <div class="w-8 h-8 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
  </div>

  <!-- OUTPUT -->
  <div id="output" 
    class="mt-6 p-5 bg-white text-black rounded-xl shadow-lg hidden">
  </div>

  <!-- CHAT -->
  <div class="mt-6">
    <h2 class="text-lg mb-2">💬 Ask Doubt</h2>
    
    <input id="chatInput" 
      class="w-full p-3 rounded text-black"/>

    <button onclick="chat()" 
      class="mt-2 bg-blue-400 px-4 py-2 rounded">
      Ask
    </button>

    <!-- CHAT OUTPUT -->
    <div id="chatOutput"
      class="mt-4 p-4 bg-white text-black rounded-xl hidden">
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
