<!DOCTYPE html>
<html lang="en">
<head>
  <title>PADHOKHUDSE</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <style>
    body { font-family: system-ui; }

    .hover-pop { transition:0.3s }
    .hover-pop:hover { transform:scale(1.05) }

    .chat-user {
      background: linear-gradient(135deg,#3b82f6,#9333ea);
      color:white;
    }

    .chat-ai {
      background: rgba(255,255,255,0.06);
    }

    .scroll-btn {
      position:absolute;
      bottom:80px;
      right:20px;
      background:#2563eb;
      padding:10px;
      border-radius:50%;
      cursor:pointer;
    }
  </style>
</head>

<body class="bg-white dark:bg-[#0f172a] text-black dark:text-gray-200 transition">

<button id="themeBtn" onclick="toggleTheme()"
class="fixed top-4 right-4 z-50 px-3 py-1 rounded bg-gray-200 dark:bg-gray-800"></button>

<!-- FRONT -->
<div id="landing" class="h-screen flex flex-col justify-center items-center text-center px-6">

<h1 class="text-5xl font-bold text-blue-500 mb-4">PADHOKHUDSE 🇮🇳❤️</h1>

<p class="text-gray-500 max-w-xl mb-6">
🎯 Aim: Learn topics easily with AI in a simple and interactive way.
</p>

<div class="flex flex-wrap gap-2 justify-center mb-6">
<button onclick="quickTopic('Python')" class="hover-pop bg-blue-500 text-white px-3 py-1 rounded">Python</button>
<button onclick="quickTopic('Algebra')" class="hover-pop bg-green-500 text-white px-3 py-1 rounded">Algebra</button>
<button onclick="quickTopic('AI')" class="hover-pop bg-purple-500 text-white px-3 py-1 rounded">AI</button>
</div>

<button onclick="showLogin()" class="bg-blue-500 text-white px-6 py-2 rounded">
Start →
</button>

<p class="absolute bottom-4 text-sm text-gray-500">
Made with ❤️ in 🇮🇳 by <b>GOVIND VAISHNAV 💗</b>
</p>

</div>

<!-- LOGIN -->
<div id="loginPage" class="hidden h-screen flex justify-center items-center">
<div class="p-6 bg-white dark:bg-[#1e293b] rounded w-80 text-center">
<input id="username" placeholder="Your name" class="w-full p-2 text-black"/>
<button onclick="login()" class="mt-3 bg-blue-500 text-white w-full p-2 rounded">Continue</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden flex h-screen">

<div class="w-60 bg-gray-100 dark:bg-[#020617] p-3">
<button onclick="newChat()" class="bg-blue-500 text-white w-full p-2 rounded mb-3">+ New</button>
<button onclick="goBack()" class="w-full mb-1">⬅ Back</button>
<button onclick="goForward()" class="w-full mb-3">➡ Forward</button>
</div>

<div class="flex-1 flex flex-col relative">

<div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

<div class="scroll-btn text-white" onclick="scrollBottom()">⬇️</div>

<div class="p-4 flex gap-2 border-t dark:border-gray-700">
<input id="topic" class="flex-1 p-3 bg-white dark:bg-[#020617] rounded border" placeholder="Ask anything...">
<button onclick="learnTopic()" class="bg-blue-500 text-white px-4 rounded">Send</button>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
