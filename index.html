<!DOCTYPE html>
<html lang="en">
<head>
  <title>PADHOKHUDSE</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: system-ui;
      background: linear-gradient(135deg,#020617,#0f172a,#1e293b);
    }

    .chat-user {
      background: linear-gradient(135deg,#3b82f6,#9333ea);
      color:white;
    }

    .chat-ai {
      background: rgba(255,255,255,0.08);
      color:#f1f5f9;
    }
  </style>
</head>

<body class="text-gray-200">

<!-- FRONT -->
<div id="landing" class="h-screen flex flex-col justify-center items-center">
  <h1 class="text-4xl mb-4">🤖 PADHOKHUDSE</h1>

  <button onclick="startApp()" 
    class="px-6 py-3 bg-blue-500 rounded">
    Start Learning
  </button>
</div>

<!-- APP -->
<div id="app" style="display:none;" class="flex h-screen">

<!-- CHAT -->
<div class="flex-1 flex flex-col">

  <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

  <div class="p-4 flex gap-2">
    <input id="topic" class="flex-1 p-3 rounded text-black" placeholder="Ask topic...">
    <button onclick="learnTopic()" class="bg-blue-500 px-4 rounded">Send</button>
  </div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
