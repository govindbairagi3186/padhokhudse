<!DOCTYPE html>
<html lang="en">
<head>
  <title>PADHOKHUDSE</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: radial-gradient(circle at 20% 20%, #1e293b, #020617);
      font-family: system-ui;
      overflow: hidden;
    }

    /* Cursor Glow */
    #cursorGlow {
      position: fixed;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(59,130,246,0.4), transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
    }

    .glass:hover {
      transform: scale(1.05);
    }

    .user { background: linear-gradient(135deg,#3b82f6,#6366f1); }
    .ai { background: rgba(255,255,255,0.05); }

    .cursor {
      display:inline-block;
      width:6px;
      background:white;
      margin-left:2px;
      animation:blink 1s infinite;
    }

    @keyframes blink { 50% {opacity:0;} }

    pre {
      background:#020617;
      padding:12px;
      border-radius:10px;
      position:relative;
      overflow-x:auto;
    }

    .copy-btn {
      position:absolute;
      top:6px;
      right:6px;
      font-size:12px;
      background:#2563eb;
      padding:4px 8px;
      border-radius:6px;
      cursor:pointer;
    }
  </style>
</head>

<body class="text-gray-200">

<div id="cursorGlow"></div>

<!-- LANDING -->
<div id="landing" class="h-screen flex flex-col justify-center items-center text-center px-6 z-10 relative">
  <h1 class="text-5xl font-bold mb-4 bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
    PADHOKHUDSE 🇮🇳❤️
  </h1>

  <p class="text-gray-400 mb-6 max-w-xl">
    Learn anything with AI — your personal tutor 🚀
  </p>

  <div class="glass p-4 rounded-xl mb-3 max-w-md">🎯 Aim: Make learning simple</div>
  <div class="glass p-4 rounded-xl mb-3 max-w-md">❓ Why: Students struggle</div>
  <div class="glass p-4 rounded-xl mb-3 max-w-md">🚀 Purpose: AI tutor</div>
  <div class="glass p-4 rounded-xl mb-6 max-w-md">👨‍💻 Govind Vaishnav 💗 🇮🇳</div>

  <button onclick="showLogin()" class="px-6 py-3 bg-blue-500 rounded-lg">
    Start Learning →
  </button>
</div>

<!-- LOGIN -->
<div id="loginPage" class="hidden h-screen flex justify-center items-center z-10 relative">
  <div class="glass p-6 rounded-xl w-80 text-center">
    <h2 class="text-xl mb-2">Welcome 👋</h2>
    <input id="username" placeholder="Your name" class="w-full p-2 rounded text-black"/>
    <button onclick="login()" class="mt-3 w-full bg-blue-500 p-2 rounded">
      Continue
    </button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden flex h-screen z-10 relative">

  <div class="w-64 glass p-3 flex flex-col">
    <button onclick="newChat()" class="mb-3 bg-blue-500 p-2 rounded">+ New Chat</button>
    <div id="history" class="flex-1 overflow-y-auto space-y-2"></div>
  </div>

  <div class="flex-1 flex flex-col p-4">
    <div id="chatBox" class="flex-1 overflow-y-auto space-y-3 p-4 glass rounded-xl"></div>

    <div class="flex mt-3 gap-2">
      <input id="topic" placeholder="Ask anything..."
        class="flex-1 p-3 bg-[#020617] rounded border border-gray-700"/>
      <button onclick="learnTopic()" class="px-4 bg-blue-500 rounded">Send</button>
    </div>
  </div>

</div>

<script src="script.js"></script>

<script>
document.addEventListener("mousemove", e => {
  const glow = document.getElementById("cursorGlow");
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});
</script>

</body>
</html>
