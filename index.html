<!DOCTYPE html>
<html lang="en">
<head>
  <title>PADHOKHUDSE</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: radial-gradient(circle at 20% 20%, rgba(255,153,51,0.15), transparent 40%),
                  radial-gradient(circle at 80% 80%, rgba(19,136,8,0.15), transparent 40%),
                  #0f172a;
    }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    body::before {
      content: "🇮🇳";
      position: fixed;
      font-size: 200px;
      opacity: 0.03;
      top: 20%;
      left: 30%;
      transform: rotate(-20deg);
      pointer-events: none;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center text-white">

<div class="w-full max-w-3xl p-6 glass shadow-2xl">

  <!-- TITLE -->
  <h1 class="text-4xl font-bold text-center mb-6 animate-pulse text-white">
    PADHOKHUDSE 🇮🇳❤️
  </h1>

  <!-- INPUT -->
  <input id="topic"
    placeholder="Enter any topic..."
    class="w-full p-3 rounded-lg text-black mb-4 focus:outline-none focus:ring-2 focus:ring-yellow-400 transition"/>

  <!-- BUTTONS -->
  <div class="flex gap-3 justify-center">
    <button onclick="learnTopic()" 
      class="bg-yellow-400 text-black px-5 py-2 rounded-lg hover:scale-110 transition">
      Learn
    </button>

    <button onclick="generateQuiz()" 
      class="bg-green-400 text-black px-5 py-2 rounded-lg hover:scale-110 transition">
      Quiz
    </button>
  </div>

  <!-- LOADER -->
  <div id="loader" class="hidden text-center mt-4 text-2xl animate-spin">
    ⏳
  </div>

  <!-- OUTPUT -->
  <div id="output" 
    class="mt-6 p-5 bg-white text-black rounded-xl shadow-lg hidden">
  </div>

  <!-- CHAT -->
  <div class="mt-6">
    <h2 class="text-lg mb-2">💬 Ask Doubt</h2>
    
    <input id="chatInput" 
      class="w-full p-3 rounded text-black"/>

    <button onclick="chat()" 
      class="mt-2 bg-blue-400 px-4 py-2 rounded">
      Ask
    </button>

    <div id="chatOutput"
      class="mt-4 p-4 bg-white text-black rounded-xl hidden">
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
