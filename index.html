<!DOCTYPE html>
<html lang="en">
<head>
  <title>PADHOKHUDSE</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: radial-gradient(circle at 20% 20%, #1e293b, #020617);
      font-family: system-ui;
    }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .user {
      background: linear-gradient(135deg,#3b82f6,#6366f1);
    }

    .ai {
      background: rgba(255,255,255,0.05);
    }

    .cursor {
      display:inline-block;
      width:6px;
      background:white;
      margin-left:2px;
      animation:blink 1s infinite;
    }

    @keyframes blink {
      50% {opacity:0;}
    }

    pre {
      background:#020617;
      padding:12px;
      border-radius:10px;
      position:relative;
    }

    .copy-btn {
      position:absolute;
      top:6px;
      right:6px;
      font-size:12px;
      background:#2563eb;
      padding:4px 8px;
      border-radius:6px;
      cursor:pointer;
    }
  </style>
</head>

<body class="text-gray-200">

<!-- 🌟 LANDING -->
<div id="landing" class="h-screen flex flex-col justify-center items-center text-center px-6">

  <h1 class="text-5xl font-bold mb-4 bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
    PADHOKHUDSE 🇮🇳❤️
  </h1>

  <p class="text-gray-400 mb-6 max-w-md text-lg">
    Your personal AI tutor to learn smarter 🚀
  </p>

  <div class="glass p-4 rounded-xl mb-4 max-w-md">🎯 Aim: Make learning simple using AI</div>
  <div class="glass p-4 rounded-xl mb-4 max-w-md">❓ Why: Students struggle with concepts</div>
  <div class="glass p-4 rounded-xl mb-4 max-w-md">🚀 Purpose: Your personal AI teacher</div>
  <div class="glass p-4 rounded-xl mb-6 max-w-md">👨‍💻 Govind Vaishnav 💗 🇮🇳 Made in India</div>

  <button onclick="showLogin()" 
    class="px-6 py-3 bg-gradient-to-r from-blue-500 to-purple-500 rounded-lg">
    Start Learning →
  </button>
</div>

<!-- 🔐 LOGIN -->
<div id="loginPage" class="hidden h-screen flex justify-center items-center">
  <div class="glass p-6 rounded-xl w-72 text-center">
    <h2 class="mb-3 text-xl">Welcome 👋</h2>
    <input id="username" placeholder="Enter your name"
      class="w-full p-2 rounded text-black"/>
    <button onclick="login()"
      class="mt-3 w-full bg-blue-500 p-2 rounded">
      Continue
    </button>
  </div>
</div>

<!-- 💬 APP -->
<div id="app" class="hidden flex h-screen">

<!-- SIDEBAR -->
<div class="w-64 glass p-3 flex flex-col">
  <button onclick="newChat()" class="mb-3 p-2 bg-blue-500 rounded">+ New Chat</button>
  <div id="history" class="flex-1 overflow-y-auto space-y-2"></div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col p-4">

  <div id="chatBox" class="flex-1 overflow-y-auto space-y-3 p-4 glass rounded-xl"></div>

  <div class="flex mt-3 gap-2">
    <input id="topic" placeholder="Ask anything..."
      class="flex-1 p-3 bg-[#020617] rounded border border-gray-700"/>
    <button onclick="learnTopic()" class="px-4 bg-blue-500 rounded">Send</button>
  </div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
