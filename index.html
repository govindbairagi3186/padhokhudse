<!DOCTYPE html>
<html lang="en">
<head>
  <title>PADHOKHUDSE</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background:#0f172a; font-family:system-ui; }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .user { background: linear-gradient(135deg,#3b82f6,#6366f1); }
    .ai { background:#1f2937; }

    .fade { animation: fade .3s ease; }
    @keyframes fade { from{opacity:0} to{opacity:1} }
  </style>
</head>

<body class="text-gray-200 flex h-screen">

<!-- SIDEBAR -->
<div class="w-64 glass p-4 flex flex-col">

  <h1 class="text-lg mb-4">📚 Chats</h1>

  <button onclick="newChat()" 
    class="mb-3 p-2 bg-blue-500 rounded text-sm">
    + New Chat
  </button>

  <div id="history" class="flex-1 overflow-y-auto space-y-2 text-sm"></div>

  <div class="text-xs text-gray-500 mt-4">
    Govind Vaishnav 💗
  </div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col p-4">

  <h1 class="text-center mb-2">PADHOKHUDSE 🇮🇳❤️</h1>

  <!-- CHAT -->
  <div id="chatBox"
    class="flex-1 overflow-y-auto space-y-3 p-4 glass rounded-lg">
  </div>

  <!-- INPUT -->
  <div class="flex gap-2 mt-3">
    <input id="topic"
      class="flex-1 p-3 bg-[#111827] rounded outline-none"
      placeholder="Ask anything..." />

    <button onclick="learnTopic()"
      class="px-4 bg-blue-500 rounded">
      Send
    </button>
  </div>

  <!-- LOADER -->
  <div id="loader" class="hidden text-center text-sm mt-2">
    📖 AI thinking...
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
